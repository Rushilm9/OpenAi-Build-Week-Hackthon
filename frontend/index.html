<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-full.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArthVest Portal — Specialist Intelligence Panel</title>
    <meta name="description" content="ArthVest Multi-Agent specialist intelligence dashboard scanning morning indices, planning allocations, and analyzing equities." />
  </head>
  <body class="bg-cream">
    <div id="root">
      <style>
        body {
          margin: 0;
          background-color: #F0F4F8;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .loader-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          min-height: 100dvh;
          user-select: none;
        }
        @media (min-width: 768px) {
          .loader-container {
            padding-left: 64px;
          }
        }
        @media (min-width: 1024px) {
          .loader-container {
            padding-left: 192px;
          }
        }
        .spinner {
          width: 48px;
          height: 48px;
          border: 4px solid #cbd5e1;
          border-top: 4px solid #0f172a;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 24px;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        .loader-text {
          font-size: 13px;
          font-weight: 700;
          color: #0F172A; /* Slate */
          letter-spacing: -0.01em;
          margin-bottom: 6px;
        }
        .loader-subtext {
          font-size: 10px;
          font-weight: 600;
          color: #999999;
          text-transform: uppercase;
          letter-spacing: 0.05em;
        }
        @keyframes pulse-ring {
          0%, 100% {
            transform: scale(1);
            opacity: 0.8;
          }
          50% {
            transform: scale(1.1);
            opacity: 0.3;
          }
        }
      </style>
      <div class="loader-container">
        <div class="spinner"></div>
        <div class="loader-text">Consulting Multi-Agent Intelligence</div>
        <div class="loader-subtext">Initializing ArthVest Portal</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
